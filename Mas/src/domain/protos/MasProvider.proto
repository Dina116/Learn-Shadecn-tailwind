syntax = "proto2";
option go_package = "../pb;pb";
package MasProvider;
import "date.proto";


  // MAS PROVIDER
service MasProvider {
   //stations
   rpc GetStationByStationNo(StationRq) returns (STATIONS) {}
   rpc GetMasStations(EMPTY) returns (ArrSTATIONS) {}
  rpc GetSettingValue(GetSettingValueRq) returns (SETTINGS) {}
   rpc GetDepartment(GetDepartmentRq) returns (DEPARTMENTS) {}
  rpc GetAllSites(EMPTY) returns (ArrSITES){}
  rpc GetSiteLogo(SiteCode)returns(SITES){}


}

message ArrSITES {
  repeated SITES sITES = 1;
}
message SITES {
  optional int32 CODE = 1;  // @gotags: gorm:"primaryKey"
  optional string DESCRIBE = 2;
  optional bool IS_ACTIVE = 3;
  optional int64 SEQ = 4;
  optional string BILLING_IP = 5;
  optional string BILLING_PASSWORD = 6;
  optional string BILLING_PORT_NO = 7;
  optional string BILLING_USERNAME = 8;
  required PROJECT_TAGS PROJECT_TAG = 9; // @gotags: `gorm:"not null"`
  optional string SITE_IMAGE =10;     // @gotags: gorm:"type:nvarchar(max)"
  optional bool HAS_MAS =11;
  optional string DESCRIBE_EN = 12;
}
enum PROJECT_TAGS {
  EDAMS5 =0;
  EDAMS4 =1;
  GIZA_SYSTEMS =2;
  MONOFIA =3;
  SOHAG =4;
  OTHERS =5;
}
 message GetSettingValueRq {
   required string keyword=1;
   optional int32 SITE_CODE = 2;
 }
message GetDepartmentRq {
  required int64 departmentID=1;
}

message StationRq {
  required int64 SiteCode=1;
  required int64 StationNo = 2;
}

message SiteCode {
  optional int32 code=1;
}

message STATIONS {
  optional int64 SITE_CODE = 1;   // @gotags: gorm:"-"
  required int64 STATION_NO = 2;  // @gotags: gorm:"primaryKey"
  optional string NAME = 3;
  optional string DESCRIPTION = 4;
  optional int64 ISCURRENT = 5;
  optional int64 DB_STANDALONE = 6;
  optional int64 DB_ACCESS = 7;
  optional int64 IS_HEADQUARTERS = 8;
  optional int64 IS_MAINTSITE = 9;
  optional int64 IS_MRREADING = 10;
  optional int64 IS_CSERVICES = 11;
  optional int64 IS_RECEIPTING = 12;
  optional string TEL_WORK = 13;
  optional string TEL_FAX = 14;
  optional string TEL_EMAIL = 15;
  optional string TEL_AHOURS = 16;
  optional string TEL_COMPL = 17;
  optional string LN_ADDRESS1 = 18;
  optional string LN_ADDRESS2 = 19;
  optional string LN_ADDRESS3 = 20;
  optional string LN_CITY = 21;
  optional int64 WORKING_MON = 22;
  optional int64 WORKING_TUE = 23;
  optional int64 WORKING_WED = 24;
  optional int64 WORKING_THU = 25;
  optional int64 WORKING_FRI = 26;
  optional int64 WORKING_SAT = 27;
  optional int64 WORKING_SUN = 28;
  optional int64 OVERTIME_MON = 29;
  optional int64 OVERTIME_TUE = 30;
  optional int64 OVERTIME_WED = 31;
  optional int64 OVERTIME_THU = 32;
  optional int64 OVERTIME_FRI = 33;
  optional int64 OVERTIME_SAT = 34;
  optional int64 OVERTIME_SUN = 35;
  optional string SITE_MEMO = 36;
  optional central.types.MasDateTime STAMP_DATE = 37;
  optional string STAMP_USER = 38;
  optional int64 MAINTSITE_CODE = 39;
  optional int64 DEFAULTWAREHOUSE = 40;
  optional int64 DEFAULTDEPOT = 41;
  optional int32 WAREHOUSESETTING = 42;
  optional int32 DEPOTDSETTING = 43;
  optional string IP_ADDRESS = 44;
  optional int64 PORT_NO = 45;
  optional int64 SECTOR_CODE = 46;
  optional string SECTOR_NAME = 47;
  optional string LN_POSTAL = 48;
  optional bool IS_VIRUAL_STATION =49; 
}

message ArrSTATIONS {
  repeated STATIONS sTATIONS = 1;
}

message SETTINGS {
  required string KEY_WORD = 1;  // @gotags: gorm:"primaryKey"
  optional string KEY_VALUE = 2;
  optional string DESCRIPTION = 3;
}

message DEPARTMENTS {
  required int64 ID =1; // @gotags: gorm:"primaryKey"
  optional string DESCRIPTION = 2;
}

message EMPTY {}
