syntax = "proto3";

option go_package = "github.com/mas-soft/micro/pb;pb";
option csharp_namespace = "MicroSoft";


package micromas;

import "date.proto";
import "common.proto";
// The greeting service definition.
service StatementsService {
    rpc Version (Empty) returns (VersionResponse);
    rpc PullStatmentsFromBilling (PullStatmentsReq) returns (PullStatmentsReply);
    rpc GetHistory (HistoryRequest) returns (HistoryReply);
}

enum PullRequestMode {
    PullRequestModeNew = 0;
    PullRequestModeUpdate = 1;
}

message TableProcess {
    string TableName = 1;
    int64 Inserted = 2;
    string Deleted = 3;
    string Updated = 4;
}

message HistoryRequest {
    int32 StationNo = 1;
    optional string Custkey = 2;
    optional int32 UserId=3;
    optional central.types.MasDate StartDate = 4;
    optional central.types.MasDate EndDate = 5;
    int32 PageSize = 6;
    int32 PageIndex = 7;
}

message HistoryReply {
    repeated PullStatmentsReply PullStatments = 1;
    int64 TOTAL_COUNT = 2;
}

message PullStatmentsReq {
    optional int32 StationNo = 1;
    string Billgroup = 2;
    string BookNo = 3;
    string WalkNo  = 4;
    optional central.types.MasDate StartDate = 5;
    optional central.types.MasDate EndDate = 6;
    optional string UserId = 7;
    optional string Custkey = 8;
    optional PullRequestMode Mode = 9;
    optional bool WithCollectedBill = 10;
}


// The response message containing the greetings
message PullStatmentsReply {
    bool HasError = 1;
    string Message = 2;
    optional central.types.MasDateTime ProcessStartTime = 4;
    optional central.types.MasDateTime ProcessEndTime = 5;
    optional PullStatmentsReq Request = 6;
    repeated ProcessWalk SusccsedWalks =7;
    repeated ProcessWalk FailedWalks =8;
    repeated TableProcess TableProceses = 9;
    string Billgroup = 10;
    bool IS_Walk = 11;
}

message ProcessWalk {
    string Billgroup = 1;
    string BookNo = 2;
    string WalkNo = 3;
    string Message=4;
    int32 SucssededBills = 5;
    bool IsSucsseded = 6;
}