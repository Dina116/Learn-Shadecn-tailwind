syntax = "proto2";
package billing;

import "google/protobuf/timestamp.proto";
//Version ="1.129.2"
//Date 16/4/2024
option go_package = "github.com/mas-soft/go-biller-proto/go;billing";

enum VERION
{
    PROTO_VERSION=57;
}

enum MeterOperationStatus{
    WORKING=0;
    NOT_WORKING=1;
}

enum SERVICE_TYPE {
    WATER =0;
    SEWER=1;
    ELECTRICITY=2;
    GAS=3;
    HYDRANT=4;
    FIRE=5;
}

enum CONNECTION_STATUS_TYPE {
    CONNECTED_WITHOUT_METER =0;
    CONNECTED_WITH_METER=1;
    DISCONNECTED_WITH_METER=2;
    DISCONNECTED_WITHOUT_METER=3;
}


enum READING_TYPE {
    ACTUAL =0;
    AVERAGE=1;//return
    ESTIMATE=2;//not return
}

enum RegularChargePeriod {
    BILL=1;
    MONTHLY=2;
}


enum ENTITY_TYPE {
    CTYPE=1;
    CTYPE_GROUP=2;
    CUSTOMER_TYPE=3;
    CUSTOMER_FLAG1=4;
    CUSTOMER_FLAG2=5;
    CUSTOMER_FLAG3=6;
    CUSTOMER_FLAG4=7;
    CUSTOMER_FLAG5=8;
    PROPERTY_VACATED=9;//
    PROPERTY_FLAG1=10;//
    PROPERTY_FLAG2=11;//
    PROPERTY_FLAG3=12;//
    PROPERTY_FLAG4=13;//
    PROPERTY_FLAG5=14;//
    CONNECTION_DIAMETER=15;//
    CONNECTION_STATUS=16;//
    CONNECTION_ISBULK_METER=18;//
    METER_DIAMETER=19;//
    SERVICE=20;
    TOWINSHIP=21;
    CONSUMPTION=22;
}

enum ChargeRegularCalcStrategy{
    EACH_ONE=0;
    SUM_ALL=1;
    MAIN_CTYPE=2;   
    HIGHTEST_AMOUNT=3;
    LOWEST_AMOUNT=4;
    DUPPLICATE_EACH_CTYPE=5;
    DUPPLICATE_EACH_CTYPE_GROUP=6;//giza style
}

enum ChargeType{
    FIXED=0;
    RELATION=1;
}

enum ReleationType{
    ENABLE_RELEATION=1;
    CHARGE_RELEATION=2;
}

message Empty {
}



//the entity meter used as entity type for calculation or enabling 
//while the consump claculated 
message Meter {
    required string MeterType = 1;    
    required string MeterRef = 2;    
    required int64 Diameter=3;
    optional int64 ConverterFactor=4;
    required MeterOperationStatus OpStatus=5;
}

//used for sub connection calculations and entity calculations

message Connection {
    required Ctg CType =1;
    //required string CTYPE_GROUP=2;
    required int64 NoUnits=3;   
    optional bool IsBulkMeter=4;
    optional int64 ConnDiameter=5;
    optional Meter Meter=6;
    optional double EstimCons=7;
    optional CONNECTION_STATUS_TYPE ConnectionStatus=8;
    repeated SubConnection SubConnections=9;
}


message SubConnection {
    required Ctg CType =1;
    optional double EstimateConsumption=3;
    optional double ConsumptionPercentage=4;
    optional int64 NoUnits=5;
    optional string ConnDiameter=6;
    optional Meter Meter=7;
}


message Service {
    required SERVICE_TYPE ServiceType = 1;
    required Connection Connection=2;
}


message Property {
    required string PropRef =1;
    optional string InfoFlag1 =3;
    optional string InfoFlag2 =4;
    optional string InfoFlag3 =5;
    optional string InfoFlag4 =6;
    optional string InfoFlag5 =7;
    optional int64 NoRooms=8;   
    repeated Service Services=9;
    optional bool IsVacated=10;
    optional string Township=11;
}

message Customer {
    required string Custkey =1;
    required int64 CustType=2;
    optional bool IsCompany =3;
    optional string InfoFlag1 =4;
    optional string InfoFlag2 =5;
    optional string InfoFlag3 =6;
    optional string InfoFlag4 =7;
    optional string InfoFlag5 =8;
    optional Property Property=9;
    required string Billgroup=10;
    optional int64 CycleLength=11;
}


///////////////////////////
//Tariff

message ServiceTariff{
    required SERVICE_TYPE ServiceType = 1;
    optional string TariffCode = 2;
    optional bool IsZeroTarif=3;//usful in case if main connection have the service while the sub connection dosn't have
    required string TransCode=4;
    optional double TaxPercentage=5;
    optional double DiscountPercentage=6;
   // optional double ConsumptionPercentage=7;
}

message Ctg{
    required string CType =1;
    optional string CTypeGroupid =2;
    repeated ServiceTariff Tariffs=3;
    optional double OP_ESTIM_CONS=4;
    optional double NOOP_ESTIM_CONS=5;
    required string Description=6;
    optional string GroupDescription=7;
    optional double Weigth=8;
}

message ExtraTariffFess {
    required string TransCode =1;
    optional string Description =2;
    optional double AmountPerMeter=3;
    optional double TaxPercentage=4;
    optional double FixedAmount=5;
}

message TariffBand {
 required double From =1;
 required double To=2;
 required double Constant=3;
 required double Charge=4;
}

message Tariff {
    required string TariffCode =1;
    //optional double DiscountPercentage=3;
    repeated ExtraTariffFess ExtraFees=4;
    repeated TariffBand Bands=5;
    required google.protobuf.Timestamp EffectDate=6;
    optional double ConsumptionPercentage=7;
}



////////////////////Regular Charges  ////////

message EntityChargeMappedValue{
    optional double From =1;
    optional double To=2;
    optional string LuKey=3;
    optional double Value=4;    
}

message EntityEnableMappedValue{
    required string LuKey=3;
    optional bool Value=4;    
}

message RegularChargeEntity {
    required ENTITY_TYPE EntityType=1;    
    repeated EntityChargeMappedValue MappedValues=2;
}

message RegularEnableEntity {
    required ENTITY_TYPE EntityType=1;    
    repeated EntityEnableMappedValue MappedValues=2;
}

message RegularCharge{
    required string RegularChargeId=1;
    required google.protobuf.Timestamp EffectDate=2;
    optional google.protobuf.Timestamp EffectDateTo=3;
    required string TransCode=4;
    required string Title=5;
    required bool IsChargable=6;
    required SERVICE_TYPE ServiceType = 8;
    required RegularChargePeriod ChargeCalcPeriod=9;
    optional int64 ChargeInterval=10;//monthly interval
    optional int64 ChargeMonthlyDay=11;//day of the mounth
    optional ChargeType ChargeType=12;
    optional double FixedCharge=13;
    optional double FixedChargeDiscount=14;
    optional double MinCharge=15;
    optional double VatPercentage=16;
    optional RegularChargeEntity RelationChargeEntity=17;
    optional RegularEnableEntity RelationEnableEntity=18;
    optional bool Bypass=19;
    optional ChargeRegularCalcStrategy CTypeCalcBase=20;
    optional bool PerUnit=21;

}

message RegularChargeRequest {
    repeated RegularCharge RegularCharge=1;
}



///////Service///////////////
message TransCode{
    required string Code=1;
    required string Description=2;
    optional int64 EdamsCode=3;
    optional int64 EdamsSCode=4;
}



message ServiceType{
    required SERVICE_TYPE SType = 8;
    optional string Description=2;
    optional bool IsSelectable=4;
    optional bool IsBasic=5;
}

message ServiceTypeRepsonce{
    required SERVICE_TYPE SType = 8;
}

// each billing request should have the customer entity and the reading for each service
message ChargeSetting{
    required int64 CycleLength=2;
    required google.protobuf.Timestamp BilingDate=3;
    optional bool IgnoreTimeEffect=4;
    optional string PaymentNo=5;
    optional bool TaxFinantialTransEmbded=6;
}

//is overall all actual or estim consumption for each service
message SubConnectionReading {
    required Ctg Ctype =1;
    required int64 NoUnits=2;
    required double Percentage=3;
    required double EstimConsump=4;    
}
message Reading {
    optional double Consump=1;
    optional double PrReading = 2; 
    optional double CrReading=3;
    optional google.protobuf.Timestamp PrDate=4;
    optional google.protobuf.Timestamp CrDate=5;
    optional READING_TYPE ReadType = 6;
    optional string ReadingBy = 7;
}

//each service may be has its meter (server meters,fire meters,electrcity meters)
message ServiceReading {
    required SERVICE_TYPE ServiceType = 1;
    required Reading Reading=2;
}
message ChargeRequest{
    required Customer Customer=1;
    repeated ServiceReading ServicesReadings=2;
    required ChargeSetting Setting=3;
    repeated SERVICE_TYPE Services = 4;
    optional Bill OldBill=6;
    optional int64 CycleLength=7;
    optional bool NEW_BILL=8;
}
//
//the expected responce is the amount for each service
message ExtraCharge{
    optional string DESCRIPTION=1;
    required string Code=2;
    required double Amount=3;
}

message MeasuredTransaction {
    required double Consump=1;
    optional double CrReading=2;
    optional double PrReading=3;
    required READING_TYPE ReadType = 4;
    optional string MeterType=5;
    optional string MeterRef=6;
}

message FinantialTransaction {
    required SERVICE_TYPE ServiceType=1;
    required string Code =2;
    required google.protobuf.Timestamp  BilngDate=3;
    required google.protobuf.Timestamp  EffDate=4;
    required double Amount=5;
    optional double TaxAmount=6;
    optional double DiscountAmount=7;
    optional Ctg Ctype =8;
    optional int64 NoUnits=9;
    optional string PropRef=10;
    optional MeasuredTransaction MTransaction=11;
    optional string Description=12;
    optional double ConsumptionPercentage=13;
    optional string TariffId=14;
    optional bool Editable=15;
    map<int32, double> BandsConsump=16;
    map<int32, double> BandsAmount=17;

}

message Bill{
    required string PaymentNo=1;
    required google.protobuf.Timestamp BilngDate=2;
    repeated FinantialTransaction FTransactions=3;
    repeated ServiceReading ServicesReadings=4;    
    required Customer Customer = 7;
    optional double ClBalance = 8;
    optional string Comment = 9;
}

message CancelledRequest{
    required int64 FormNo=1;
    optional google.protobuf.Timestamp FormDate=2;
    optional string Status=3;  
    optional string Comment = 4;  
}


message BillResponce{
    repeated Bill Bills=1;    
    optional CancelledRequest RecalcForm=2;
    optional bool Calculated_Again=3;
}

message ServiceInfo {
    required string Name=1;
    required string Version=2;
}

message SetupData {
    repeated Tariff Tariffs=1;
    repeated Ctg Ctgs=2;
    repeated RegularCharge RegularCharges=3;
    repeated TransCode TransCodes=4;
    optional bool With_Round=5;
}

message CustomersList{
    repeated Customer Customers=1;
}


message Key {
    required string Key=1;
    required google.protobuf.Timestamp BilngDate=2;
}

message LookUp{
    required string Code =1;
    required string Description =2;
}


message LookUpsResponce{
    repeated LookUp LookUps=1;
}


message CtgsResponce{
    repeated Ctg Ctgs=1;
}

message Entity{
    required ENTITY_TYPE EntityType=1;    
}

message GetBillRequest {
    required string Custkey =1;
    optional string PaymentNo=2;
    optional google.protobuf.Timestamp BilngDateFrom=3;
    optional google.protobuf.Timestamp BilngDateTo=4;
    optional string FormNo=5;
    optional bool From_Cancel_Bill=6;
    optional int64 BPM_FORM_NO = 7;
    optional int32 BPM_APPLICATION_TYPE_ID = 8;
    optional int32 BPM_COMPANY_ID = 9;
    optional bool WITH_BPM = 10;
    optional bool WITH_FAKE = 11;
    optional bool NEW_BILLER = 12;
}

message LoginRequest{
    required string Username=1;
    required string Password=2;
}

message LoginResponce{
    optional string Token=1;
    optional bool Succssed=2;
}

message PostMessage{
    required BillResponce Data=1;
    optional bool IsCancelledRequest =2;
    optional int64 CancelledRequestFormNo=3;
    optional bool WITH_BPM = 4;
    optional bool WITH_FAKE = 5;
}

//enums tarriff provider
enum ENTITY_CATEGORY_TYPE {
  UNKNOWN_CATEGORY = 0;
  LOOKUP = 1;
  RANGE = 2;
}
message SERVICE_TYPE_DATA {
  optional int32 ID=1;
  optional string NAME=2;
  optional string DESCRIPTION=3;
}

message GET_SERVICETYPES {
  repeated SERVICE_TYPE_DATA SERVICE_TYPE_DATA=1;
}

message CHARGE_TYPE_DATA {
  optional int32 ID=1;
  optional string NAME=2;
  optional string DESCRIPTION=3;
}

message GET_CHARGETYPES {
  repeated CHARGE_TYPE_DATA CHARGE_TYPE_DATA=1;
}

message Entity_lockup {
  optional string ID = 1;
  optional string NAME = 2;
}

message ENTITY_TYPE_DATA {
  optional int32 ID=1;
  optional string NAME=2;
  optional string DESCRIPTION=3;
  optional ENTITY_CATEGORY_TYPE category_type=4;
  repeated Entity_lockup entity_lockup = 5;
}

message GET_ENTITYTYPES {
  repeated ENTITY_TYPE_DATA ENTITY_TYPE_DATA=1;
}

message CHARGE_REGULAR_CALC_STRATEGY {
  optional int32 ID=1;
  optional string NAME=2;
  optional string DESCRIPTION=3;
}

message GET_CHARGEREGULARCALCSTRATEGY {
  repeated CHARGE_REGULAR_CALC_STRATEGY CHARGE_REGULAR_CALC_STRATEGY=1;
}


//Tarriff 
message Tariffs {
  optional int64 TARRIF_ID = 1;            // @gotags: gorm:"primaryKey;column:TARRIF_ID;type:int;notnull;autoIncrement:false"
  optional string TARIFF_CODE = 2;         // @gotags: gorm:"column:TARIFF_CODE;type:nvarchar(50);notnull"
  optional google.protobuf.Timestamp EFFECT_DATE = 3;         // @gotags: gorm:"column:EFFECT_DATE;type:date;notnull"
  optional string DESCRIPTION = 4;         // @gotags: gorm:"column:DESCRIPTION;type:nvarchar(250);notnull"
  optional double CONSUMP_PERCENTAGE = 5;  // @gotags: gorm:"column:CONSUMP_PERCENTAGE;type:double"
}
message ArrTariffs {
  repeated Tariffs Tariffs=1;
}

message TariffBands {
    optional string TARIFF_ID = 1;                          // @gotags: gorm:"primaryKey;column:TARIFF_ID;type:nvarchar(128);notnull;autoIncrement:false"
    optional google.protobuf.Timestamp EFFECT_DATE = 2;     // @gotags: gorm:"primaryKey;column:EFFECT_DATE;type:date;notnull"
    optional double RANGE_FROM = 3;                         // @gotags: gorm:"primaryKey;column:RANGE_FROM;type:double;notnull"
    optional double RANGE_TO = 4;                           // @gotags: gorm:"primaryKey;column:RANGE_TO;type:double;notnull"
    optional double CONSTANT = 5;                           // @gotags: gorm:"column:CONSTANT;type:double;notnull"
    optional double CHARGE = 6;                             // @gotags: gorm:"column:CHARGE;type:double;notnull"
}

message ArrTariffBands {
  repeated TariffBands TariffBands=1;
}
message TariffExtraFees {
  optional int64 TARIFF_ID = 1;            // @gotags: gorm:"primaryKey;column:TARIFF_ID;type:int;notnull;autoIncrement:false"
  optional string TRANS_CODE = 2;          // @gotags: gorm:"primaryKey;column:TRANS_CODE;type:nvarchar(128);notnull"
  optional string DESCRIPTION = 3;         // @gotags: gorm:"column:DESCRIPTION;type:nvarchar(max)"
  optional double AMOUNT_PER_METER = 4;    // @gotags: gorm:"column:AMOUNT_PER_METER;type:double"
  optional double AMOUNT_PER_PERCENTAGE = 5; // @gotags: gorm:"column:AMOUNT_PER_PERCENTAGE;type:double"
  optional double FIXED_AMOUNT = 6;        // @gotags: gorm:"column:FIXED_AMOUNT;type:double"
}
message ArrTariffExtraFees {
  repeated TariffExtraFees TariffExtraFees=1;
}

message TariffsData {
  optional Tariffs Tariffs =1;
  repeated TariffBands TariffBands=2;
  repeated TariffExtraFees TariffExtraFees=3;
}

message TariffCodeReq {
  optional string TARIFF_CODE = 1;                          
}

message TariffsDataRes {
  repeated TariffsData TariffsData= 1;                          
}

message TariffIdReq {
  optional string TARIFF_ID = 1;                          
}

message ArrRegularCharges {
  repeated RegularCharge RegularCharges=1;
}

message RegularChargeInfo {
  optional RegularCharge RegularCharges=1;
}

message RegularChargeIdReq {
  optional string REGULAR_CHARGE_ID = 1; 
} 

message RegularChargeReq {
  optional string REGULAR_CHARGE_ID=1;
}

message RegularRelationEntity {
  optional string REGULAR_CHARGE_ID = 1;        // @gotags: gorm:"primaryKey;column:REGULAR_CHARGE_ID;type:int;notnull"
  optional ReleationType RELEATION_TYPE = 2;      // @gotags: gorm:"primaryKey;column:RELEATION_TYPE;type:int;notnull"
  optional ENTITY_TYPE ENTITY_TYPE = 3;        // @gotags: gorm:"column:ENTITY_TYPE;type:int;notnull"
}
message ArrRegularRelationEntity {
  repeated RegularRelationEntity RegularRelationEntity=1;
}

message RegularRelationValues {
  optional string REGULAR_CHARGE_ID = 1;          // @gotags: gorm:"primaryKey;column:REGULAR_CHARGE_ID;type:int;notnull"
  optional ENTITY_TYPE ENTITY_TYPE = 2;          // @gotags: gorm:"primaryKey;column:ENTITY_TYPE;type:int;notnull"
  optional string LU_KEY = 3;                    // @gotags: gorm:"primaryKey;column:LU_KEY;type:nvarchar(128);notnull"
  optional double RANGE_FROM = 4;       // @gotags: gorm:"column:RANGE_FROM;type:double"
  optional double RANGE_TO = 5;         // @gotags: gorm:"column:RANGE_TO;type:double"
  optional double VALUE = 6;            // @gotags: gorm:"column:VALUE;type:double"
  optional bool ENABLE_VALUE = 7;       // @gotags: gorm:"column:ENABLE_VALUE;type:bit"
}
message ArrRegularRelationValues {
  repeated RegularRelationValues RegularRelationValues=1;
}

enum FLAGS_TYPES {
  UNKNOWN_FLAG = 0;
  ONE = 1;
  TWO = 2;
  THREE = 3;
  FOUR = 4;
  FIVE = 5;
}

enum PROPERTY_VACATED_TYPES {
  UNKNOWN_PROPERTY = 0;
  VACATED = 1;
  NOT_VACATED = 2;
}

message TransCodesData {
  optional int32 id = 1;
  optional string name = 2;
}
message TransCodesRes { 
    repeated TransCodesData TransCodesData = 1; 
}

enum TransCodes {
  WATER_AMT = 0;
  SEWER_AMT = 1;
  BASIC_AMT = 2;
  TANZEEM_AMT = 3;
  TAX_AMT = 4;
  CRDT_AMT = 5;
  DBT_AMT = 6;
  CLEAN_AMT = 7;
  ROUND_AMT = 8;
  OTHER_AMT = 9;
  ADMIN_AMT = 10;
  CONTRACT_AMT = 11;
  INITIAL_AMT = 12;
}

message CTGConsumptionServiceTariff {
  optional string CTypeID = 1;          // @gotags: gorm:"primaryKey;column:CTYPE_ID;notnull"
  optional int32 ServiceType = 2;       // @gotags: gorm:"primaryKey;column:SERVICE_TYPE;notnull"
  optional string TransCode = 3;        // @gotags: gorm:"column:TRANS_CODE;notnull"
  optional string TariffID = 4;         // @gotags: gorm:"column:TARIFF_ID;notnull"
  optional string CTypeGrpID = 5;       // @gotags: gorm:"column:CTYPEGRP_ID"
  optional bool IsZeroTariff = 6;       // @gotags: gorm:"column:IS_ZERO_TARIF"
  optional double TaxPercentage = 7;    // @gotags: gorm:"column:TAX_PERCENTAGE"
  optional double DiscountPercentage = 8; // @gotags: gorm:"column:DISCOUNT_PERCENTAGE"
}
message ArrCTGConsumptionServiceTariff {
  repeated CTGConsumptionServiceTariff CTGConsumptionServiceTariff = 1;
}



///////////////////////////PROVIDER///////////////////////


service BillingChargeService {
  rpc Info(Empty) returns (ServiceInfo){}
  rpc Charge (ChargeRequest) returns (BillResponce) {}
  rpc Setup(SetupData) returns (Empty) {}
}

service BillingTariffProvider {
    rpc Info(Empty) returns (ServiceInfo){}
    rpc GetSetupData (Empty) returns (SetupData) {}
    
    //enums
    rpc GetServiceTypes(Empty)returns(GET_SERVICETYPES);
    rpc GetChargeTypes(Empty)returns(GET_CHARGETYPES);
    rpc GetEntityTypes(Empty)returns(GET_ENTITYTYPES);
    rpc GetChargeRegularCalcStrategy(Empty)returns(GET_CHARGEREGULARCALCSTRATEGY);
    rpc GetTransCodes(Empty) returns (TransCodesRes);

    // CTGConsumptionServiceTariff RPCs
    rpc GetAllCTGConsumptionServiceTariffs(Empty) returns (ArrCTGConsumptionServiceTariff);
    rpc SaveCTGConsumptionServiceTariff(CTGConsumptionServiceTariff) returns (Empty);

    // Tariffs RPCs
    rpc GetAllTariffs(Empty) returns (ArrTariffs);
    rpc SaveTariffs(Tariffs) returns (Tariffs);
    rpc SaveTariffsData(TariffsData) returns (Empty);
    rpc GetTariffCodeHistory(TariffCodeReq) returns (TariffsDataRes);
    // TariffBands RPCs
    rpc GetAllTariffBands(TariffIdReq) returns (ArrTariffBands);
    rpc SaveTariffBands(TariffBands) returns (Empty);
    // TariffExtraFees RPCs
    rpc GetAllTariffExtraFees(TariffIdReq) returns (ArrTariffExtraFees);
    rpc SaveTariffExtraFees(TariffExtraFees) returns (Empty);

    // RegularCharges RPCs
    rpc GetAllRegularCharges(Empty) returns (RegularChargeRequest);
    rpc GetRegularChargeInfo(RegularChargeIdReq) returns (RegularChargeInfo);
    rpc SaveRegularCharges(RegularCharge) returns (Empty);
    // RegularRelationEntity RPCs
    rpc GetAllRegularRelationEntity(RegularChargeReq) returns (ArrRegularRelationEntity);
    rpc SaveRegularRelationEntity(RegularRelationEntity) returns (Empty);
    // RegularRelationValues RPCs
    rpc GetAllRegularRelationValues(RegularChargeReq) returns (ArrRegularRelationValues);
    rpc SaveRegularRelationValues(RegularRelationValues) returns (Empty);
}

service BillingDataProvider {
  rpc Info(Empty) returns (ServiceInfo){}
  rpc GetCustomerByCustkey (Key) returns (Customer) {}
  rpc GetCustomersByBillgroup (Key) returns (CustomersList) {}
  rpc GetLoockup (Entity) returns (LookUpsResponce) {}
  rpc GetCtgs (Empty) returns (CtgsResponce) {}
  rpc GetBillsByCustkey (GetBillRequest) returns (BillResponce) {}
  rpc GetBillsByFormNo (GetBillRequest) returns (BillResponce) {}
  rpc Login (LoginRequest) returns (LoginResponce){}
  //rpc GetSettings (Empty) returns (ServiceTypeRepsonce){}
}


service BillingDataCousumer {
  rpc Info(Empty) returns (ServiceInfo){}
  rpc WriteFinantialData (PostMessage) returns (Empty) {}
  rpc WriteFinantialDataOne (PostMessage) returns (Empty) {}
}



service Engine {
  rpc Info(Empty) returns (ServiceInfo){}
  rpc Calulate(ChargeRequest) returns (BillResponce){}
  rpc Post (PostMessage) returns (Empty) {}
  rpc PostOne (PostMessage) returns (Empty) {}
  rpc GetCustomerByCustkey (Key) returns (Customer) {}
  rpc GetLoockup (Entity) returns (LookUpsResponce) {}
  rpc GetCtgs (Empty) returns (CtgsResponce) {}
  rpc GetBillsByCustkey (GetBillRequest) returns (BillResponce) {}
  rpc GetBillsByFormNo (GetBillRequest) returns (BillResponce) {}
  //rpc Login (LoginRequest) returns (LoginResponce){}
  //rpc GetSettings (Empty) returns (ServiceTypeRepsonce){}
}

service LoginService {
    rpc Login (LoginRequest) returns (LoginResponce){}
    rpc Info(Empty) returns (ServiceInfo){}
}