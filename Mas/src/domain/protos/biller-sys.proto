syntax = "proto3";
option go_package = "../pb;pb";
package PkgBillerSystem;
import "date.proto";


  // Biller System Service
  service BillerSystem {
    // CTG_CONSUMPTION_TYPES_GROUP RPCs
    rpc GetAllCTGConsumptionTypesGroup(Empty) returns (ArrCTG_CONSUMPTION_TYPES_GROUP);
    rpc SaveCTGConsumptionTypesGroup(CTG_CONSUMPTION_TYPES_GROUP) returns (Empty);

    // CTG_CONSUMPTION_TYPES RPCs
    rpc GetAllCTGConsumptionTypes(Empty) returns (ArrCTG_CONSUMPTION_TYPES);
    rpc SaveCTGConsumptionTypes(CTG_CONSUMPTION_TYPES) returns (Empty);

    // CTGConsumptionServiceTariff RPCs
    rpc GetAllCTGConsumptionServiceTariffs(Empty) returns (ArrCTGConsumptionServiceTariff);
    rpc SaveCTGConsumptionServiceTariff(CTGConsumptionServiceTariff) returns (Empty);

    // Tariffs RPCs
    rpc GetAllTariffs(Empty) returns (ArrTariffs);
    rpc SaveTariffs(Tariffs) returns (Tariffs);
    rpc SaveTariffsData(TariffsData) returns (Empty);
    rpc GetTariffCodeHist(TariffCodeReq) returns (TariffsDataRes);

    // TariffBands RPCs
    rpc GetAllTariffBands(TariffIdReq) returns (ArrTariffBands);
    rpc SaveTariffBands(TariffBands) returns (Empty);

    // TariffExtraFees RPCs
    rpc GetAllTariffExtraFees(TariffIdReq) returns (ArrTariffExtraFees);
    rpc SaveTariffExtraFees(TariffExtraFees) returns (Empty);

    // RegularCharges RPCs
    rpc GetAllRegularCharges(Empty) returns (ArrRegularCharges);
    rpc GetRegularChargeInfo(RegularChargeIdReq) returns (RegularChargeInfo);
    rpc SaveRegularCharges(RegularCharges) returns (Empty);

    // RegularRelationEntity RPCs
    rpc GetAllRegularRelationEntity(RegularChargeReq) returns (ArrRegularRelationEntity);
    rpc SaveRegularRelationEntity(RegularRelationEntity) returns (Empty);
  
    // RegularRelationValues RPCs
    rpc GetAllRegularRelationValues(RegularChargeReq) returns (ArrRegularRelationValues);
    rpc SaveRegularRelationValues(RegularRelationValues) returns (Empty);

    // TransactionsTypes RPCs
    rpc GetAllTransactionTypes(Empty)returns(ArrTRANACTION_TYPES);
    rpc SaveTransactionType(TRANACTION_TYPES)returns(Empty);
    rpc GetAllTransactionTypeCatagory(Empty)returns(ArrTransactionCatorgry);

    // Cycles RPCs
    rpc OpenNewCycle(CYCLES)returns(Empty);
    rpc EditCycle(CYCLES)returns(Empty);
    rpc DeleteCycle(CYCLES)returns(Empty);
    rpc GetCycleByID(GetByID)returns(CYCLES);
    rpc GetAllCycles(Empty)returns(ArrCYCLES);
    rpc GetAllCyclesForCalc(Empty)returns(ArrCYCLES);
    rpc CloseReadingCycleByID(GetByID)returns(Empty);
    rpc CloseCollectionCycleByID(GetByID)returns(Empty);
    rpc AllowCollectionCycleByID(GetByID)returns(Empty);
    rpc StopCollectionCycleByID(GetByID)returns(Empty);
    rpc AllowReadingsCycleByID(GetByID)returns(Empty);
    rpc StopReadingsCycleByID(GetByID)returns(Empty);
    rpc AllowElectronicCollectionCycleByID(GetByID)returns(Empty);
    rpc StopElectronicCollectionCycleByID(GetByID)returns(Empty);
    rpc AllowElectronicReadingsBycleByID(GetByID)returns(Empty);
    rpc StopElectronicReadingsBycleByID(GetByID)returns(Empty);
    rpc GetLastReadingCycleByStationNoBillgroup(StationNoBillgroupRq)returns(CYCLES);
    rpc GetLastCollectionCycleByStationNoBillgroup(StationNoBillgroupRq)returns(CYCLES);
    rpc GetLastCycleByStationNoBillgroup(StationNoBillgroupRq)returns(CYCLES);
    // Finance RPCs
    rpc GetAllUnInvoicedTransactionsByCustkey(CustkeyRq)returns(ArrF_TRANS);
    rpc GetAllInvoicedTransactionsByCustkey(CustkeyRq)returns(ArrF_TRANS);
    rpc InsertFincanceTransaction(InsertFincanceTransactionRq)returns(InsertFincanceTransactionRs);
    rpc GetCustomerTransactions(CustkeyRq)returns(ArrF_TRANS);
    rpc GetCustomerTransactionsByInvoiceID(GetInvoicedTransactionsRq)returns(ArrF_TRANS);
    rpc PostAllFeesAndPayment(PostFeesToBilling)returns(PostFeesToBilling){}
    // اجمالي رصيد العميل التراكمي
    rpc GetCustomerComulativeBalance(CustkeyRq)returns(Amout);
    rpc ForceHashAllTransations(Empty)returns(Empty);
    rpc CancelFeesPayment(APP_FEES)returns(Empty);

    // Invoices RPCs
    rpc GetAllCustomerInvoicesByFlags(GetCustomerInvoicesByFlag)returns(ArrINVOICES);
    // rpc CollectInvoice(CollectionRequest)returns(Empty);
    rpc CollectInvoices(CollectionRequest)returns(Empty);
    rpc RecalcBills(BILLS_EXPECTED)returns(Empty);
    rpc GetInvoicesByBookNoWalkNoBilngDate(BookNoWalkNoBdateRq)returns(ArrINVOICES);
    
    // Gard
    rpc InverntorInvoice(InventorInvoice)returns(Empty);
    rpc InverntorInvoices(ArrInventorInvoice)returns(Empty);
    
    // Agreems
    rpc GetAllCustomerAgreemsByFlags(GetAgreemsByFlags)returns(ArrAGREEMS);
    rpc InsertAgreem(AGREEMS)returns(Empty);
    rpc InsertAgreems(ArrAGREEMS)returns(Empty);
    rpc CancelAgreem(CancelAgreemReq)returns(Empty);
    rpc CancelAgreems(ArrCancelAgreemReq)returns(Empty);

    // Readings RPCs
    rpc GetBooksLastReadings(GetBooksLastReadingsReq)returns(ArrGetBooksLastReadingsRs);
    rpc GetAllReadingsByFlags(GetReadingsByFlags)returns(ArrMETER_READING);
    rpc GetAllReadingsByFlagsByMeters(GetReadingsByFlagsandMeters)returns(ArrMetersMeterReading);
    rpc GetReadingsByBookNoWalkNoBilngDate(BookNoWalkNoBdateRq)returns(ArrGetBooksLastReadingsRs);
    rpc CancelUnInvoicedRead(METER_ID_READING_NO)returns(Empty);
    // rpc CancelInvoicedRead(METER_ID_READING_NO)returns(Empty);
    rpc PostReadings(ArrMETER_READING)returns(Empty);
    rpc SetReadings(ArrSetReadingReq)returns(Empty);
    rpc AdjustPrRead(ArrMETER_READING)returns(Empty);
    rpc GetLastReading(GetReadingRQ)returns(ArrMETER_READING);
    rpc CancelUnInvoicedReadings(ArrMETER_READING)returns(Empty);

    // invoicing RPCs
    rpc CalcBillgroup(CalcBillgroupReq)returns(Empty);
    rpc ReverseBillgroup(CalcBillgroupReq)returns(Empty);
    rpc CancelProgressCalcBillgroup(CalcBillgroupReq)returns(Empty);
    // rpc ReverseStation(CalcStationReq)returns(Empty);
    rpc CalcCustomers(ArrCalcCustomerReq)returns(Empty);
    rpc ReverseCustomers(ArrCalcCustomerReq)returns(Empty);
    rpc CalcMonitor(Empty)returns(stream CalcProgressMap);
    rpc CalcBulkCustomers(CalcBulkCustomerReq)returns(Empty);
    rpc ReverseBulkCustomers(CalcBulkCustomerReq)returns(Empty);

    // system RPCs
    rpc GetAllSites(Empty)returns(ArrSites);
    rpc SaveSite(SITES)returns(Empty);

    rpc GetAllStations(Empty)returns(ArrStations);
    rpc SaveStation(STATIONS)returns(Empty);
    
    // sectors
    rpc GetAllSectors(Empty)returns(ArrSECTORS);
    rpc SaveSector(SECTORS)returns(Empty);

    rpc GetAllBillingGroups(Empty)returns (ArrBILLING_GROUPS);
    rpc AddBillgroup(BILLING_GROUPS)returns(Empty);
    rpc EditBillgroup(BILLING_GROUPS)returns(Empty);

    // Devices -- gohh
    rpc GetAllDevices(Empty)returns(ArrDevices);
    rpc RegisterDevice(DEVICES)returns(Empty);

    // emps 
    rpc GetAllEmps(Empty)returns(ArrEMPS);
    rpc SaveEmp(EMPS)returns(Empty);
    
    // customerBooks
    rpc GetAllCustomerBooks(Empty)returns(ArrCUSTOMER_Books);
    rpc GetAllCustomerBooksByStationNo(GetByID)returns(ArrCUSTOMER_Books);
    rpc SaveCustomerBooks(CUSTOMER_BOOKS)returns(Empty);

    // MeterBooks
    rpc GetAllMeterBooks(Empty)returns(ArrMETER_BOOKS);
    rpc GetAllMeterBooksByStationNo(GetByID)returns(ArrMETER_BOOKS);
    rpc SaveMeterBooks(METER_BOOKS)returns(Empty);

    // import data from billing
    rpc GetAllReadingsFromBilling(Empty)returns(Empty);
    rpc GetAllFinanceFromBilling(Empty)returns(Empty);
    rpc GetAllAgreems(Empty)returns(Empty);
    rpc GetAllInvoicesFromBilling(BILLGROUPS)returns(Empty);

    rpc GetAllInvoicesFromMas(BILLGROUPS)returns(Empty);
    rpc ImporterToFardy(ImporterReq)returns(Empty);
    rpc ImportMainLu(ImporterReq)returns(Empty);
    rpc ImportReadings(ImporterReadingsReq)returns(Empty);
    rpc ImportReadings10 (ImporterReadingsReq)returns(Empty);
    rpc ImportAgrems(ImporterReq)returns(Empty);
    rpc ImportAgrems10(ImporterReq)returns(Empty); 
    rpc ImporterToFardy10ThRamadan(ImporterReq)returns(Empty);


    rpc ValidateChangeBillgroup(ChangeBillgroupReq)returns(Empty);

    //
    rpc ValidateAndFixInvoices(Empty)returns(Empty);
    rpc VerifyIssuanceInvoices(CalcBillgroupReq)returns(ArrErrorByCustkey);
    //
    // Archive F_TRANS records
    rpc ArchiveFTrans(ArchiveFTransReq)returns(Empty);

    // reports
    rpc GetBillPrint(GroupByReq)returns(ArrBILL_PRINT);
    rpc GetBillPrintAdjustment(BillPrintAdjustmentRQ)returns(ArrBILL_PRINT);
    rpc GetUnbilledAndWalletsBalanceAndAgremAmounts(UnbilledAmountsReq)returns(UnbilledAmountsRes);

    //enums
    rpc GetServiceTypes(Empty)returns(GET_SERVICETYPES);
    rpc GetChargeTypes(Empty)returns(GET_CHARGETYPES);
    rpc GetEntityTypes(Empty)returns(GET_ENTITYTYPES);
    rpc GetChargeRegularCalcStrategy(Empty)returns(GET_CHARGEREGULARCALCSTRATEGY);
    rpc GetInvoicesSummaryByBookNoWalkNo(GetCustomerInvoicesByFlag)returns(ArrInvoicesSummaryResp); 
    rpc GetSummaryRepot(SummaryRepotRq)returns(ArrSummaryRepotResp);
    rpc GetSummaryColl(SummaryCollRq)returns(ArrSummaryCollResp);
    rpc GetDebtDashboard(Empty)returns(ArrDebtDashboardResp);
    rpc GetEsdarDashboard(Empty)returns(ArrEsdarDashboardResp);
    rpc GetAppTracer(BILL_TRACER)returns(BILL_TRACER){}
    rpc GetIndividualInvoiceReport(GetCustomerInvoicesByCustkeyBooknoBillgroup)returns(ArrInvoicesAndTotal);
    rpc GetTransCodes(Empty) returns (TransCodesRes);
}
message TransCodesData {
  int32 id = 1;
  string name = 2;
}
message TransCodesRes { repeated TransCodesData TransCodesData = 1; }

enum TransCodes {
  WATER_AMT = 0;
  SEWER_AMT = 1;
  BASIC_AMT = 2;
  TANZEEM_AMT = 3;
  TAX_AMT = 4;
  CRDT_AMT = 5;
  DBT_AMT = 6;
  CLEAN_AMT = 7;
  ROUND_AMT = 8;
  OTHER_AMT = 9;
  ADMIN_AMT = 10;
  CONTRACT_AMT = 11;
  INITIAL_AMT = 12;
}
message ArrDebtDashboardResp {
 repeated DebtDashboardResp Resp=1;
 }
 message DebtDashboardResp {
  optional int64 SITE_NO = 1;
  optional int32 STATION_NO =2;
  double TotalUnCollBilledAmount =3;
  }
message ArrEsdarDashboardResp {
 repeated EsdarDashboardResp Resp=1;
 }
 message EsdarDashboardResp {
  optional int64 SITE_NO = 1;
  optional int32 STATION_NO =2;
  double TotalBilledAmount =3;
  }

message SummaryRepotRq {
  optional int64 SITE_NO = 1;
  optional int32 STATION_NO =2;
  optional string BILLGROUP =3;
  optional string BOOK_NO =4;
  optional int32 WALK_NO =5;
  optional string CUSTKEY= 6;
  optional central.types.MasDateTime START_BILNG_DATE= 7;
  optional central.types.MasDateTime END_BILNG_DATE= 8;
  bool PER_C_TYPE =  9;
  bool PER_STATION = 10;
  bool PER_BILNG_DATE = 11;
  bool PER_CUSTKEY = 12;
  bool PER_METER_SIZE =13;
  bool PER_SEWER_STATUS =14;
  bool PER_METER_CONDITION =15;
  bool PER_BILLGROUP =16;
  bool PER_C_TYPE_GROUP =17;  
  bool PER_CON_STATUS =18;
    // Custom WHERE conditions (e.g., ["FIELD = VALUE, STATUS = 'ACTIVE'"])
  optional string CUSTOM_FILTERS = 19;
  // Additional GROUP BY fields (e.g., ["CUSTOM_FIELD", "REGION"])
  optional string CUSTOM_GROUP_BY = 20;
}

message ArrSummaryRepotResp {
repeated SummaryRepotResp Resp=1;
}
message SummaryRepotResp {
  optional int64 SITE_NO = 1;
  optional int32 STATION_NO =2;
  optional string BILLGROUP =3;
  optional string BOOK_NO =4;
  optional int32 WALK_NO =5;
  optional string CUSTKEY= 6; 
  optional string C_TYPE= 7;
  optional string C_TYPE_GROUP= 8;
  optional int32 METER_SIZE= 9;
  optional string SEWER_STATUS= 10;
  optional string METER_CONDITION= 11;
  optional central.types.MasDateTime BILNG_DATE= 12;
  optional string CON_STATUS =13;
  double UnbilledAmount= 14;
  double WalletsBalance= 15;
  double Due_Amount =16;
  double AMOUNT_PAID = 17;
  double AgreemAmount=18;
  double TotalUnCollBilledAmount =19;
  double TotalAmount =20;
  DebtDetails  UnCollDebtDetails=21; // DebtDetails depends on collection status 
  DebtDetails  CollDebtDetails=22; // DebtDetails depends on collection status 
  optional string CUSTOM_GROUP_BY = 23;
}

message SummaryCollRq {
  optional int64 SITE_NO = 1;
  optional int32 STATION_NO =2;
  optional string BILLGROUP =3;
  optional string BOOK_NO =4;
  optional int32 WALK_NO =5;
  optional string CUSTKEY= 6;
  optional central.types.MasDateTime START_BILNG_DATE= 7;
  optional central.types.MasDateTime END_BILNG_DATE= 8;
  bool PER_C_TYPE =  9;
  bool PER_STATION = 10;
  bool PER_BILNG_DATE = 11;
  bool PER_CUSTKEY = 12;
  bool PER_METER_SIZE =13;
  bool PER_SEWER_STATUS =14;
  bool PER_METER_CONDITION =15;
  bool PER_BILLGROUP =16;
  bool PER_C_TYPE_GROUP =17;  
  bool PER_CON_STATUS =18;
    // Custom WHERE conditions (e.g., ["FIELD = VALUE, STATUS = 'ACTIVE'"])
  optional string CUSTOM_FILTERS = 19;
  // Additional GROUP BY fields (e.g., ["CUSTOM_FIELD", "REGION"])
  optional string CUSTOM_GROUP_BY = 20;
  optional COLL_PERIOD  COLLECTION_PERIOD =21;
  optional central.types.MasDateTime START_COLL_DATE= 22;
  optional central.types.MasDateTime END_COLL_DATE= 23;
}
message ArrSummaryCollResp {
repeated SummaryCollResp Resp=1;
}
message SummaryCollResp {
  optional int64 SITE_NO = 1;
  optional int32 STATION_NO = 2;
  optional string BILLGROUP = 3;
  optional string BOOK_NO = 4;
  optional int32 WALK_NO = 5;
  optional string CUSTKEY = 6; 
  optional string C_TYPE = 7;
  optional string C_TYPE_GROUP = 8;
  optional int32 METER_SIZE = 9;
  optional string SEWER_STATUS = 10;
  optional string METER_CONDITION = 11;
  optional central.types.MasDateTime BILNG_DATE = 12;
  optional string CON_STATUS = 13;
  double Due_Amount = 16;
  double AMOUNT_PAID = 17;
  DebtDetails CollDebtDetails = 22;
  optional string CUSTOM_GROUP_BY = 23;
  optional COLL_PERIOD COLLECTION_PERIOD = 24;
  optional string COLL_PERIOD_DESC = 25;
}
message DebtDetails {
  double WATER_AMT = 1;                           
  double SEWER_AMT = 2;                           
  double BASIC_AMT = 3;                           
  double TANZEEM_AMT = 4;                         
  double TAX_AMT = 5;                            
  double ROUND_AMT = 6;                          
  double CREDIT_AMT = 7;                         
  double DEBIT_AMT = 8;                          
  double OTHER_AMT = 9;                          
  double INSTALL_AMT = 10;                        
  double PENALTIES = 11;                          
  double ADVANCED_PAYMENT= 12;                    
  double ORIGINAL_ADJ = 13;                       
  double INITIAL_AMT =14;   
  double ADMIN_AMT =15;
  double CONTRACT_AMT =16;                      
  double DELAYED_CRDT =17;
  double ADVANCED_CRDT =18;
  double CLEAN_AMT =19;
}

message UnbilledAmountsReq {
  optional string CUSTKEY=1;
}

message UnbilledAmountsRes {
  optional double UnbilledAmount=1;
  optional double WalletsBalance=2;
  optional double AgreemAmount=3;
  optional double TotalAmount=4;
  optional double TotalUnCollBilledAmount=5;
}
message ArrInvoicesSummaryResp {
  repeated InvoicesSummary Resp=1;
}
 message InvoicesSummary {
  string BILLGROUP =1;
  string BOOK_NO =2;
  int32 WALK_NO =3;
  central.types.MasDateTime BILNG_DATE =4;
  int32 STATION_NO =5;
  double Due_Amount =6;
  double ORIGINAL_BILL_AMT =7;
  double AMOUNT_PAID =8;
  double REMINDER_AMOUNT =9;
  }


message InsertFincanceTransactionRq {
  repeated IFT IFT=1;
}

message IFT {
 optional F_TRANS F_TRANS = 1;
  bool IS_DEPT =2;
  int64 ID =3;
}

message  InsertFincanceTransactionRs {
  repeated IFT IFT=1;
}

message ArchiveFTransReq {
  optional central.types.MasDateTime ToDate = 1;
  optional int64 SiteNo = 2;
  optional int64 StationNo = 3;
  optional string Billgroups = 4;
}

message ImporterReq {
optional int64 StationNo = 1;
repeated string billgroup = 2;
repeated string customer = 3;
optional central.types.MasDateTime FromDate = 4;
optional bool Fix = 5;
CITYS CITYS = 6;
bool Import_Credit_10_Only = 7;
}
message ImporterReadingsReq {
CITYS CITYS = 1;
int64 StartId = 2;
}

message BILLGROUPS {
  repeated string BILLGROUPS=1;
}
message GetByID {
  int64 ID =1;
  string BILLGROUP =2;
}
message RegularRelationEntity {
  string REGULAR_CHARGE_ID = 1;        // @gotags: gorm:"primaryKey;column:REGULAR_CHARGE_ID;type:int;notnull"
  RELATION_TYPE RELEATION_TYPE = 2;      // @gotags: gorm:"primaryKey;column:RELEATION_TYPE;type:int;notnull"
  ENTITY_TYPE ENTITY_TYPE = 3;        // @gotags: gorm:"column:ENTITY_TYPE;type:int;notnull"
}
message ArrRegularRelationEntity {
  repeated RegularRelationEntity RegularRelationEntity=1;
}

message RegularRelationValues {
  string REGULAR_CHARGE_ID = 1;          // @gotags: gorm:"primaryKey;column:REGULAR_CHARGE_ID;type:int;notnull"
  ENTITY_TYPE ENTITY_TYPE = 2;          // @gotags: gorm:"primaryKey;column:ENTITY_TYPE;type:int;notnull"
  string LU_KEY = 3;                    // @gotags: gorm:"primaryKey;column:LU_KEY;type:nvarchar(128);notnull"
  optional double RANGE_FROM = 4;       // @gotags: gorm:"column:RANGE_FROM;type:double"
  optional double RANGE_TO = 5;         // @gotags: gorm:"column:RANGE_TO;type:double"
  optional double VALUE = 6;            // @gotags: gorm:"column:VALUE;type:double"
  optional bool ENABLE_VALUE = 7;       // @gotags: gorm:"column:ENABLE_VALUE;type:bit"
}
message ArrRegularRelationValues {
  repeated RegularRelationValues RegularRelationValues=1;
}

message RegularChargeReq {
  optional string REGULAR_CHARGE_ID=1;
}
message TariffIdReq {
  optional string TARIFF_ID = 1;                          
}
message TariffBands {
    string TARIFF_ID = 1;                          // @gotags: gorm:"primaryKey;column:TARIFF_ID;type:nvarchar(128);notnull;autoIncrement:false"
    central.types.MasDateTime EFFECT_DATE = 2;     // @gotags: gorm:"primaryKey;column:EFFECT_DATE;type:date;notnull"
    double RANGE_FROM = 3;                         // @gotags: gorm:"primaryKey;column:RANGE_FROM;type:double;notnull"
    double RANGE_TO = 4;                           // @gotags: gorm:"primaryKey;column:RANGE_TO;type:double;notnull"
    double CONSTANT = 5;                           // @gotags: gorm:"column:CONSTANT;type:double;notnull"
    double CHARGE = 6;                             // @gotags: gorm:"column:CHARGE;type:double;notnull"
}
message ArrTariffBands {
  repeated TariffBands TariffBands=1;
}
message TariffExtraFees {
  int64 TARIFF_ID = 1;            // @gotags: gorm:"primaryKey;column:TARIFF_ID;type:int;notnull;autoIncrement:false"
  string TRANS_CODE = 2;          // @gotags: gorm:"primaryKey;column:TRANS_CODE;type:nvarchar(128);notnull"
  optional string DESCRIPTION = 3;         // @gotags: gorm:"column:DESCRIPTION;type:nvarchar(max)"
  optional double AMOUNT_PER_METER = 4;    // @gotags: gorm:"column:AMOUNT_PER_METER;type:double"
  optional double AMOUNT_PER_PERCENTAGE = 5; // @gotags: gorm:"column:AMOUNT_PER_PERCENTAGE;type:double"
  optional double FIXED_AMOUNT = 6;        // @gotags: gorm:"column:FIXED_AMOUNT;type:double"
}
message ArrTariffExtraFees {
  repeated TariffExtraFees TariffExtraFees=1;
}
message Tariffs {
  int64 TARRIF_ID = 1;            // @gotags: gorm:"primaryKey;column:TARRIF_ID;type:int;notnull;autoIncrement:false"
  string TARIFF_CODE = 2;         // @gotags: gorm:"column:TARIFF_CODE;type:nvarchar(50);notnull"
  central.types.MasDateTime EFFECT_DATE = 3;         // @gotags: gorm:"column:EFFECT_DATE;type:date;notnull"
  string DESCRIPTION = 4;         // @gotags: gorm:"column:DESCRIPTION;type:nvarchar(250);notnull"
  optional double CONSUMP_PERCENTAGE = 5;  // @gotags: gorm:"column:CONSUMP_PERCENTAGE;type:double"
}
message ArrTariffs {
  repeated Tariffs Tariffs=1;
}

message TariffsDataRes {
  repeated TariffsData TariffsData= 1;                          
}

message TariffsData {
  Tariffs Tariffs =1;
  repeated TariffBands TariffBands=2;
  repeated TariffExtraFees TariffExtraFees=3;
}

message TariffCodeReq {
  string TARIFF_CODE = 1;                          
}

message EntityChargeMappedValue{
  optional double From =1;
  optional double To=2;
  optional string LuKey=3;
  optional double Value=4;    
}

message EntityEnableMappedValue{
  string LuKey=3;
  optional bool Value=4;    
}

message RegularChargeEntity {
  ENTITY_TYPE EntityType=1;    
  repeated EntityChargeMappedValue MappedValues=2;
}

message RegularEnableEntity {
  ENTITY_TYPE EntityType=1;    
  repeated EntityEnableMappedValue MappedValues=2;
}

message RegularChargeIdReq {
  string REGULAR_CHARGE_ID = 1; 
} 

message RegularCharges {
  string REGULAR_CHARGE_ID = 1; // @gotags: gorm:"primaryKey;column:REGULAR_CHARGE_ID;type:int;notnull"
  central.types.MasDateTime EFFECT_DATE = 2; // @gotags: gorm:"column:EFFECT_DATE;type:date;notnull"
  optional central.types.MasDateTime EFFECT_DATE_TO = 3; // @gotags: gorm:"column:EFFECT_DATE_TO;type:date"
  SERVICE_TYPE SERVICE_TYPE = 4; // @gotags: gorm:"column:SERVICE_TYPE;type:int;notnull"
  string TRANS_CODE = 5; // @gotags: gorm:"column:TRANS_CODE;type:nvarchar(50);notnull"
  string TITLE = 6; // @gotags: gorm:"column:TITLE;type:nvarchar(250);notnull"
  ChargeType CHARGE_TYPE = 7; // @gotags: gorm:"column:CHARGE_TYPE;type:int;notnull"
  bool IS_CHARGABLE = 8; // @gotags: gorm:"column:IS_CHARGABLE;type:bit;notnull"
  RegularChargePeriod CHARGE_CALC_PERIOD = 9; // @gotags: gorm:"column:CHARGE_CALC_PERIOD;type:int;notnull"
  optional int64 CHARGE_INTERVAL = 10; // @gotags: gorm:"column:CHARGE_INTERVAL;type:bigint"
  optional int64 CHARGE_MONTHLY_DAY = 11; // @gotags: gorm:"column:CHARGE_MONTHLY_DAY;type:bigint"
  optional double FIXED_CHARGE = 12; // @gotags: gorm:"column:FIXED_CHARGE;type:double"
  optional double FIXED_CHARGE_DISCOUNT = 13; // @gotags: gorm:"column:FIXED_CHARGE_DISCOUNT;type:double"
  optional double MIN_CHARGE = 14; // @gotags: gorm:"column:MIN_CHARGE;type:double"
  optional double VAT_PERCENTAGE = 15; // @gotags: gorm:"column:VAT_PERCENTAGE;type:double"
  optional RegularChargeEntity RELATION_CHARGE_ENTITY_TYPE = 16; // @gotags: gorm:"-"
  optional RegularEnableEntity RELATION_ENABLE_ENTITY_TYPE = 17; // @gotags: gorm:"-"
  optional bool BY_PASS = 18; // @gotags: gorm:"column:BY_PASS;type:bit"
  optional ChargeRegularCalcStrategy CALC_STARTEGY = 19; // @gotags: gorm:"column:CALC_STARTEGY;type:int"
  optional bool PER_UNIT = 20; // @gotags: gorm:"column:PER_UNIT;type:bit"
}
message ArrRegularCharges {
  repeated RegularCharges RegularCharges=1;
}

