  rpc RejectFullRainMosadakat      (All_Rain_Mosadakat)         returns (MessageResponse){}   // رفض المصادقات
  rpc ApprovePartialRainMosadakat  (All_RAIN_Mosadakat_Subs)   returns (MessageResponse){}   // اعتماد المصادقات جزئي
  rpc RejectPartialRainMosadakat  (All_RAIN_Mosadakat_Subs)   returns (MessageResponse){}   // اعتماد المصادقات جزئي

//-------------------------------------------------------------------------------- banks

