message Emptymessage {}

message PartiallyPaidReportRes{
  repeated PartiallyPaidData       RepData =2;
  repeated SummaryData               SummaryData=1;
}

message PartiallyPaidData{
  optional string                    OLD_KEY = 1;                                       //  رقم الاشتراك 
  optional string                    ITEM_NAME = 2;                                    //  نوع الدفعه 
  optional int64                     GROUP_ID = 3;                                     // رقم الجهه
  optional string                    GROUP_NAME =4;                                    // اسم الجهه
  optional int64                     SUB_GROUP_ID = 5;                                // رقم الإدارة
  optional string                    SUB_GROUP_NAME = 6;                              // اسم الإدارة
  optional string                    FILE_NO = 7;                                      // رقم المستند
  optional central.types.MasDateTime COLLECTION_DATE  =8;                             // تاريخ السداد 
  optional central.types.MasDateTime BILING_DATE  =9;                                 // تاريخ الدوره 
  optional int64                     STATION_NO =10;                                   // رقم الفرع
  optional string                    STATION_NAME =11;                                 // اسم الفرع
  optional double                    TOTAL_AMT =12;                                     // اجمالي الفاتورة
  optional double                    NOT_SEWER_AMT =13;                                // قيمة جميع البنود عدا الصرف
  optional double                    SEWER_AMT =14;                                     // قيمة صرف
  optional double                    NOT_SEWER_AMT_COLL =15;                           // قيمه المسدد جميع البنود عدا الصرف
  optional double                    SEWER_AMT_COLL =16;                               // قيمه المسدد صرف
  optional double                    COLL_AMT =17;                                     // اجمالي المسدد
  optional double                    NOT_SEWER_AMT_REM =18;                           // متبقي جميع البنود عدا الصرف
  optional double                    SEWER_AMT_REM =19;                               // متبقي صرف
  optional double                    TOTAL_REM_AMT =20;                                // اجمالي المتبقي
  optional string                    PAY_ID=21;
}

message CollectReqRes {
  optional string                    Message = 1;
  optional bool                      Done = 2;
  optional int64                     ID = 3;
  optional ReportData                ReportData= 4;
}

message ReportData {
  optional int64  EMP_ID= 1;
  optional string EMP_NAME= 2;
  optional string CUSTKEY= 3;
  optional string CUSTNAME= 4;
  optional central.types.MasDateTime COLLECT_DATE= 5;
  repeated Receipts_list RECEIPTS_LIST= 6;
  optional int64  GROUP_ID= 7;
  optional int64  SUBGROUP_ID= 8;
  optional string GROUP_NAME = 9;
  optional string SUBGROUP_NAME = 10;
  optional string DISCOUNT_DOCUMENT =11; 
}

message Receipts_list {
  optional double AMOUNT=1;
  optional central.types.MasDateTime BILING_DATE=2;
  optional string                    RECEIPT_NO=3; 
}

message SettingRes {
  optional bool Required_Sub_Group=1;
}

message AllBanks {
  repeated Bank BANKS = 1; 
}

message Bank {
  optional int64  BANK_ID = 1;                                 // @gotags: gorm:"primaryKey;autoIncrement:false" 
  optional string BANK_CODE = 2;                               // رقم حساب البنك 
  optional string BANK_NAME = 3;                               // اسم البنك
  optional string BANK_DESC = 4;                               // وصف البنك
  optional bool DELETED = 5;  
}

message BankID {
  optional int64 BANK_ID = 1;
}



message RainMosadakatReq {
  optional int64                     SUB_GROUP_ID = 1;                                  // رقم الاداره
  optional central.types.MasDateTime FROM_BILING_DATE = 2;                                    // تاريخ دورات من
  optional central.types.MasDateTime TO_BILING_DATE = 3;                                      // تاريخ دورات الى
  optional int64                     MINISTRY_ID = 4;  
  optional int64                     UNIT_ACCOUNT_ID = 5; 
  optional int64                     ASSOCIATION_ID = 6;
  optional int64                     UNIT_ID = 7; 
  optional int64                     DEPENDENCY_ID = 8; 
  optional int64                     GROUP_ID = 9;
  optional bool                      PRINT = 10;
  optional GOV_GROUP_BY              GROUP_BY = 11;
}

message All_RAIN_Mosadakat_Subs {
  optional int64                     SUB_GROUP_ID = 1;
  optional string                    SUB_GROUP_NAME = 2;
  optional double                    TOTAL_AMT = 3;                                  //إجمالي المديونية
  optional double                    REMINDER_AMT = 4;                               //الغير مسدد ف الفتره
  repeated RainMosadakat             SUBSBILLS = 5;
  optional string                    PARTIAL_COMMENT = 6;                                   // تعليق المصادقه الجزئي
}



message All_Rain_Mosadakat {
  repeated RainMosadakat                RainMosadakat = 1;
}

message RainMosadakat {
  optional double                    TOTAL_AMT = 2;                                  //إجمالي المديونية
  optional double                    REMINDER_AMT = 3;                               //الغير مسدد ف الفتره
  optional central.types.MasDateTime BILNG_DATE = 4;                                 // تاريخ الدوره
  optional int64                     SUB_GROUP_ID =5;
  optional string                    NAME = 6;
  optional string                    ADDRESS = 7;
  optional int32                     SITE_CODE = 8;
  optional int64                     GROUP_ID =9;
  optional int64                     MINISTRY_ID = 10;                                 // الوزاره
  optional int64                     ACCOUNTING_UNIT_ID = 11;                          // الوحدة الحسابية
  optional int64                     ASSOCIATION_ID = 12;                              // التصنيف 1 (مصادقات)
  optional int64                     UNIT_ID = 13;                                     // التصنيف 2 (وحدات)
  optional int64                     DEPENDENCY_ID = 14;                               // تابعية الاداره
  optional string                    MINISTRY_NAME = 15;                                 // اسم الوزاره
  optional string                    ACCOUNTING_UNIT_NAME = 16;                          // اسم الوحدة الحسابية
  optional string                    ASSOCIATION_NAME = 17;                              // اسم التصنيف 1 (مصادقات)
  optional string                    UNIT_NAME = 18;                                     // اسم التصنيف 2 (وحدات)
  optional string                    DEPENDENCY_NAME = 19;                               // اسم تابعية الاداره
  optional int64                     BUDGETARY_AUTHORITY_CODE = 20;                   //كود الهيئة الموازنية                             
  optional string                    GROUP_NAME = 22;                                    // اسم المجموعه
  optional double                    MOSADAKA_AVILABLE_AMT = 23;                         // المبلغ المتاح للمصادقه
  optional string                    PAYMENT_NO = 24;                        
  optional MOSADAKA_STATUS           MOSADAKA_STATUS=25;       
  optional int64                     COLLECTOR_ID = 26;  
  optional string                    COLLECTOR_NAME = 27;
  optional DELIVERY_STATUS           DELIVERY_STATUS = 28;
  optional central.types.MasDateTime COLL_DELIVERY_DATE = 29;                               
  optional central.types.MasDateTime SUB_DELIVERY_DATE = 30;  
  optional central.types.MasDateTime REQ_TO_BILNG_DATE = 31; 
  optional central.types.MasDateTime REQ_FROM_BILING_DATE = 32; 
  optional double                    MOSADAKA_AMT = 33;                                    //المبلغ المصادق
  optional string                    REJECTED_REASON = 34;                                   // سبب الرفض
  optional bool                      SUB_NEW = 35;                                         // هل الجهه جديده
  optional string                    PARTIAL_COMMENT = 36;                                   // تعليق المصادقه الجزئي
  optional bool                      IS_REJECTED = 37;                                        // هل مرفوضه
  optional double                    REJECTED_AMT = 38;                                // المبلغ المرفوض
}

message RainDeliveryMosadakatReq {
  repeated RAIN_MOSADAKA_DELIVERY RAIN_MOSADAKA_DELIVERY = 1;         // تسليم المصادقات
  optional central.types.MasDateTime COLL_DELIVERY_DATE = 2;                                // تاريخ التسليم للمحصل
  optional central.types.MasDateTime SUB_DELIVERY_DATE = 3;                                 // تاريخ التسليم للجهه,
  optional int64                     COLLECTOR_ID = 4;                                      // المحصل
  optional bool                      SUB_DELIVERY = 5;
}

message RainMosadakaReq {
  repeated RAIN_MOSADAKA_DELIVERY RAIN_MOSADAKA_DELIVERY = 1;
}

message RAIN_MOSADAKA_DELIVERY {
  optional string                    MOSADAKA_KEY = 1;                                     //@gotags: gorm:"primaryKey;autoIncrement:false"
  optional int64                     SUB_GROUP_ID =2;                                    
  optional int64                     GROUP_ID =3;
  optional string                    SUB_GROUP_NAME = 4;
  optional string                    GROUP_NAME = 5;  
  optional central.types.MasDateTime FROM_BILING_DATE = 6;                                  // تاريخ دورات من
  optional central.types.MasDateTime TO_BILING_DATE = 7;                                    //@gotags: gorm:"primaryKey;autoIncrement:false"
  optional central.types.MasDateTime COLL_DELIVERY_DATE = 8;                                // تاريخ التسليم للمحصل
  optional central.types.MasDateTime SUB_DELIVERY_DATE = 9;                                 // تاريخ التسليم للجهه,
  optional int64                     COLLECTOR_ID = 10;                                      // المحصل
  optional double                    TOTAL_AMT = 11;                                        //إجمالي المديونية
  optional double                    COLLECT_REMINDER_AMT = 12;                                     //الغير مسدد ف الفتره
  optional double                    MOSADAKA_REMINDER_AMT = 13;                            //المبلغ المتبقي مصادقه
}

message RAIN_MOSADAKA {
  optional int64                     MOSADAKA_ID = 1;                                      //@gotags: gorm:"primaryKey;autoIncrement:false"
  optional string                    MOSADAKA_KEY = 2;                                     //@gotags: gorm:"primaryKey;autoIncrement:false"
  optional int64                     SUB_GROUP_ID =3; 
  optional int64                     GROUP_ID =4;
  optional string                    SUB_GROUP_NAME = 5;
  optional string                    GROUP_NAME = 6;  
  optional central.types.MasDateTime FROM_BILING_DATE = 7;                                  // تاريخ دورات من
  optional central.types.MasDateTime TO_BILING_DATE = 8;                                    //@gotags: gorm:"primaryKey;autoIncrement:false"
  optional central.types.MasDateTime COLL_DELIVERY_DATE = 9;                                // تاريخ التسليم للمحصل
  optional central.types.MasDateTime SUB_DELIVERY_DATE = 10;                                 // تاريخ التسليم للجهه,
  optional int64                     COLLECTOR_ID = 11;                                      // المحصل
  optional double                    TOTAL_AMT = 12;                                        //إجمالي المديونية
  optional double                    MOSADAKA_AMT = 13;                                    //المبلغ المصادق
  optional double                    MOSADAKA_REMINDER_AMT = 14;                            //المبلغ المتبقي مصادقه
  optional double                    COLLECT_REMINDER_AMT = 15;                             //الغير مسدد ف الفتره
  optional central.types.MasDateTime MOSADAKA_DATE = 16;                                  // تاريخ المصادقه
  optional bool                      ACCEPTED = 17;                                         // معتمد
  optional bool                      REJECTED = 18;                                        // مرفوض
  optional bool                      DELIVERED = 19;                                        // مسلمة
  optional bool                      PARTAIL= 20;                                           // جزئي
  optional string                    REJECTED_REASON = 21;                                   // سبب الرفض
  optional string                    PARTIAL_COMMENT = 22;                                   // تعليق المصادقه الجزئي
  optional string                    PAYMENT_NO = 23;                                        //@gotags: gorm:"-"
}

