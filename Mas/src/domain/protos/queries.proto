syntax = "proto2";
// option go_package = "github.com/mas-soft/mas-customers/qpb";
option go_package = "../qpb;qpb";
package PkgQueries;
import "date.proto";
// import "date.proto";
service QueryService {
  rpc SearchCustomer(SearchCustomerRq)returns(SearchCustomerRs){}
  rpc GetAllBillgroups(Empty) returns (ArrBILLING_GROUPS) {}
  rpc GetCustomerBooksByBillgroup(BillgroupRq) returns (ArrCUSTOMER_Books) {}
  rpc GetCustomerMainDataByCustkey(CustkeyRq)returns(CUSTOMER_MAIN_DATA){}
  rpc GetCustomerTransactions(CustkeyRq)returns(ArrTRANSACTIONS){}
  rpc GetCustomerStatements(CustkeyRq)returns(ArrSTATMENT){}
  rpc GetCustomerAgreements(CustkeyRq)returns(ArrCustAgreem){}
  rpc GetCustomerReadings(CustkeyRq)returns(ArrREADINGS){}
  rpc GetBillPrintCust(CustkeyRq)returns(ArrBILL_PRINT);
  rpc GetAllCustomerHistory(CustkeyRq)returns(ArrCST_HISTORY){}
  rpc TestRpc(TEST)returns (JSON_TEST){}
  rpc GetCustWalletDetails(WalletDetailsRq)returns(ArrWalletDetails);
  rpc GetCustomermetersReadings(CustkeyRq)returns(ArrCustREADINGS){}

}

message Empty {
}
message BillgroupRq {
   required string BILLGROUP =1;
}
message BILLING_GROUPS {
  required  int32 STATION_NO =1; 
  required string GROUP_ID =2;  
    optional string DESCRIPTION = 3;
  }
message ArrBILLING_GROUPS {
repeated BILLING_GROUPS bILLING_GROUPS = 1;
}
message CUSTOMER_BOOKS {
  required int32 STATION_NO = 1;
  required string BILLGROUP = 2;
  required string CODE = 3;
optional string DESCRIBE = 4;
}

message ArrCUSTOMER_Books {
repeated CUSTOMER_BOOKS CUSTOMER_BOOKS = 1;
}
message SearchCustomerRq {
    repeated Filters Filters=1;
}
message SearchCustomerRs {
    repeated BasicCustomerDetails BasicCustomerDetails =1;
}
message BasicCustomerDetails {
  required  string CUSTKEY =1;
    optional string SURNAME =2;
    optional string BILLGROUP =3;
    optional string BOOK_NO =4;
    optional string UA_ADDRESS=5;
    optional string OLD_KEY =6;
    optional central.types.MasDateTime Open_Date =7;
    optional string WALK_NO = 8;
    optional string METER_REF = 9;
    optional int64 PROPERTY_ID  = 10;
    optional int32 STATION_NO = 11;
    optional string STATION_NAME = 12;
    optional int64 METER_ID  = 13;
}
message Filters {
  required  string Value=1;
  required   FilterCondition FilterCondition =2;
  required  SearchFilters SearchFilters=3;
}

enum FilterCondition{
    undifiendFilterCondition =0;
    Equals =1;
    Contains =2;
    StartWith=3;
    EndWith =4;
    InContain =5;
}
enum SearchFilters{
    undifiendSearchFilters =0;
    CUSTKEY = 1;
    BILLGROUP =2;
    BOOK_NO =3;
    SURNAME=4;
    OLD_KEY=5;
    PROP_REF =6;
    METER_REF =7;
    METER_TYPE= 8;
    UA_ADDRESS=9;
    NATIONAL_ID =10;
    TEL_NO = 11;
    TAX_NO = 12;
    WALK_NO = 13;
    PROPERTY_ID = 14;

}
message CUSTOMER_MAIN_DATA {
  required string CUSTKEY =1;
  optional string SURNAME =2;
  optional string BILLGROUP =3;
  optional string BOOK_NO =4;
  optional string UA_ADDRESS=5;
  optional string OLD_KEY =6;
  optional string PROP_REF =7;
  optional string METER_REF =8;
  optional string PREV_CUSTKEY=9;
  optional string PREV_PROP_REF=10;
  optional int32 NO_UNITS=11;
  optional string METER_DIAM=12;
  optional string METER_STATUS = 13;
  optional string CONN_STATUS=14;
  optional string NID =15;
  optional string TAX_NO =16;
  optional bool HAS_WATER=17;
  optional bool HAS_SEWER=18;
  optional central.types.MasDateTime INSTALL_DATE=19;
  optional central.types.MasDateTime REMOVAL_DATE=20;
  optional string C_TYPE_DESCRIPTION =21;
  optional string METER_TYPE=22;
  optional string METER_TYPE_DESC=30;
  optional string METER_MAKE=23;
  optional string METER_MAKE_DESC=31;
  optional central.types.MasDateTime CONN_DATE=24;
  optional string MOBILE_NO =25;
  optional int64 METER_NO_DIGITS =26;
  optional double LAST_READING =27;
  optional bool IS_MASTER_CONNECTION =28;
  optional int64 NO_SUB_CONNECTIONS =29;
  optional string C_TYPE =32;
  optional bool IS_PREPAID =33;
  optional int64 STATION_NO = 34;
  optional string STATION_NAME = 35;
  optional bool HAS_METER = 36;
  optional int64 METER_ID =37;
  repeated CST_MULTI_CTG CST_MULTI_CTG = 38;
  optional string BOOK_NAME =39;
  optional central.types.MasDateTime Open_date =40;
  repeated CST_TENANT TENANTS =41; // @gotags: gorm:"-"
  optional string UA_ADRESS5 = 42;
  optional string SERIAL_NO = 43;
  optional string METER_TAG_NO = 44;
  optional double WalletAmount = 45; // @gotags: gorm:"-"
  optional double AgreemsAmount = 46; // @gotags: gorm:"-"
  optional double UnbilledAmount = 47; // @gotags: gorm:"-"
  optional double Cl_balance = 48; // @gotags: gorm:"-"
  repeated CustWallet CustWallet = 49; // @gotags: gorm:"-"
  optional string DIRECTION_1 = 50;
  optional string DIRECTION_2 = 51;
  optional string DIRECTION_3 = 52;
  optional string DIRECTION_4 = 53;
  optional string WALK_NO = 54;
}
message CST_TENANT {
  optional int64 TENANT_ID = 1;  // @gotags: gorm:"primaryKey;autoIncrement:true"
  required string CUSTKEY = 2;
  required string NAME = 3;
  optional string MOBILE_NO = 4;
  required string NID = 5;
  required central.types.MasDateTime START_DATE = 6;
  optional central.types.MasDateTime END_DATE = 7;
}
message CST_MULTI_CTG {
  optional string PROP_REF =1;
  optional int64 CONNECTION_ID=2;
  required string C_TYPE=3;
  optional string C_TYPE_DESC = 4;
  required double ALLOC_PERC =5;
  required double ALLOC_PERC_SEWER = 6;
  required int32 NO_UNITS =7;
  required double ESTIM_CONS_PU =8;
}
  message CustkeyRq {
    required  string CUSTKEY =1;
  }
  message ArrTRANSACTIONS {
    repeated TRANSACTIONS TRANSACTIONS=1;
  }
  message TRANSACTIONS {
    required int64 TRANS_NO = 1;
    required double AMOUNT = 2;
    optional string DESCRIPTION = 3;
    optional string DOCUMENT_NO = 4;
    optional central.types.MasDateTime EFFECT_DTE = 5;
    optional central.types.MasDateTime BILNG_DATE = 6;
    optional string MEMO_FLD = 7;
    optional int64 STATM_NO = 8;
    optional int64 TRNS_TYPE = 9;
    optional int64 TRNS_STYPE = 10;
    optional double CR_READING = 11;
    optional double PR_READING = 12;
    optional double CONSUMP = 13;
    optional int64 READ_TYPE = 14;
    optional double RUNNING_BLANCE = 15;
  }
  message ArrSTATMENT {
    repeated STATMENT STATMENT=1;
  }
  message STATMENT {
    optional string PAYMENT_NO = 1;
    required  int64 STATM_NO = 2;
    optional double CL_BLNCE = 3;
    optional double CUR_CHARGES = 4;
    optional double OP_BLNCE = 5;
    required  central.types.MasDateTime BILNG_DATE = 6;
    required int32 DELIVERY_ST = 7;
    repeated TRANSACTIONS TRANSACTIONS=8;
  }
  message ArrCustAgreem {
    repeated CustAgreem CustAgreem=1;
  }
  message CustAgreem {
    optional int64 AGRM_NO = 1;
    optional string CUSTKEY = 2;
    optional string AGRM_REF = 3;
    optional central.types.MasDateTime EFF_DATE = 4;
    optional central.types.MasDateTime COMPLETION_DATE = 5;
    optional double AGRM_VALUE = 6;
    optional double AGRM_IMMPAY = 7;
    optional string IMMPAY_RCPTNO = 8;
    optional int64 NO_INSTALMENTS = 9;
    optional int64 REMINDER_NO_INSTALMENTS = 10;
    optional double REMINDER_AMOUNT = 11;
    optional double INSTLM_AMOUNT = 12;
    optional double AGRM_TYPE = 13;
    optional double AGRM_STATUS = 14;
    optional double TRNS_TYPE = 15;
    optional double TRNS_STYPE = 16;
    repeated AgremInstalment Instalments = 17;
    optional string AGREM_NAME = 18;
    optional double PENALTY_VALUE =19; // @gotags: gorm:"_" 
    optional int32 PENALTY_TYPE =20; // @gotags: gorm:"_" 
    optional string PENALTY_TYPE_NAME =21; // @gotags: gorm:"_" 
  }
  message AgremInstalment {
    required  int64 INSTALMENT_NO = 1;
    optional int64 TRANS_NO = 2;
    optional double AMOUNT = 3;
    optional central.types.MasDateTime INVOICE_DATE = 4;
    optional central.types.MasDateTime CHARGE_DATE = 5;
  }
  message READINGS {
    required int64 READING_NO =1;
    required  double B_READINGS =2;
    required double CONSUMP =3;
    required  bool IS_CANCELLED =4;
    required bool IS_INVOICED =5;
    optional central.types.MasDateTime INVOICE_DATE=6;
    optional central.types.MasDateTime READING_DATE=7;
    optional int32 MAS_READ_METHOD = 8;
    optional string MAS_READ_BY = 9;
  }
  message ArrREADINGS {
    repeated READINGS READINGS=1;
  }
  message CST_HISTORY {
    required int64 ID =1;                              // @gotags: gorm:"primaryKey;autoIncrement:true"
    required string NOTES =2;                          // @gotags: gorm:"notnull;type:nvarchar(max)"
    required string BPM_FORM=3;                        // @gotags: gorm:"notnull"
    required central.types.MasDateTime STAMP_DATE = 4; // @gotags: gorm:"notnull"
    required string STAMP_USER=5;                      // @gotags: gorm:"notnull"
    required string CUSTKEY =6;                        // @gotags: gorm:"notnull;index"
    required int64 APP_ID =7;                          // @gotags: gorm:"notnull"
    required bool IS_CANCELLED =9;                     // @gotags: gorm:"notnull"
  }
  message ArrCST_HISTORY {
    repeated CST_HISTORY CST_HISTORY=1;
  }

  message TEST {
    required int32 NUMBER_R =1;
    optional int32 NUMBER_O =2;
    required string STRING_R=3;
    optional string STRING_O=4;
