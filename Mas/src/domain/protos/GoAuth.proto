syntax = "proto2";
option go_package = "../pb;pb";
package GoAuth;
import "date.proto";

service login {

  // SignIn

  rpc SignIn(LoginRequest) returns (LoginResponse) {}
  rpc SignInWithProfile(LoginRequest) returns (SignInResponse) {}
  rpc LinkeWith(RELATED_ACOUNTS) returns (RegisterResponse) {}
  rpc AdminSignIn(AdminSignInRequest) returns (LoginResponse) {}
  rpc SignInWith(SignInWithRequest) returns (LoginResponse) {}

  // Register portal

  rpc Register(RegisterRequest) returns (RegisterResponse) {}
  rpc validatecode(ValRequest) returns (RegisterResponse) {}

  // ForgetPass portal

  rpc ForgetPass(ForgetRequest) returns (RegisterResponse) {}

  // backend

  rpc GetCrmAppSignInToken(Emptymessage) returns (LoginResponse) {}
  rpc GetNotifSignInToken(Emptymessage) returns (LoginResponse) {}

  // lookups

  rpc GetAllSites(Emptymessage) returns (GetAllSitesResponse) {}
  rpc GetCounts(GetCountsRequest) returns (GetCountsResponse) {}

  rpc GetLicence(Emptymessage) returns (licenceResponse) {}
}

service GoAuth {

  // User

  rpc GetUserProfile(Emptymessage) returns (GetUserProfileResponse) {}
  rpc GetAllUser(Emptymessage) returns (GetAllUserResponse) {}
  rpc RegisterUser(RegisterUserRequest) returns (RegisterResponse) {}
  rpc UpdateUser(RegisterUserRequest) returns (RegisterResponse) {}
  rpc UpdateUserpass(PassUserRequest) returns (RegisterResponse) {}
  rpc GetUserbyid(GetUserRequest) returns (GetUserProfileResponse) {}
  rpc GetUserbyUserName(GetUserByNameRequest) returns (GetUserProfileResponse) {
  }
  rpc DeleteUser(USERS) returns (RegisterResponse) {}
  rpc ResetPass(ResetPassRequest) returns (RegisterResponse) {}
  rpc GetUsetAccessContraint(Emptymessage) returns (access_contraint_response) {
  }
  rpc GetUserByCashier(CashierRequest) returns (GetUserProfileResponse) {}

  // clint

  rpc AddRelatedCustkey(AddRelatedCustkeyRequest) returns (RegisterResponse) {}
  rpc UpdateProfile(RegisterRequest) returns (RegisterResponse) {}
  rpc GetClientbyid(GetClientRequest) returns (CLIENTS) {}
  rpc Activation(ActivationRequest) returns (RegisterResponse) {}
  rpc ResendActivation(Emptymessage) returns (RegisterResponse) {}
  rpc GetClientProfile(Emptymessage) returns (CLIENTS) {}
  rpc GetClientbyCustkey(CustRequest) returns (CLIENTS) {}
  rpc GetAllData(AllDataRequest) returns (AllDataResponse) {}
  rpc RefreshToken(Emptymessage) returns (RegisterResponse) {}
  rpc RefreshTokenWithNewSt(Min_USER_STATIONS) returns (RegisterResponse) {}
  rpc MIcroUpdateClient(MicroUpdateRequest) returns (RegisterResponse) {}
  rpc GetClientSCounts(Emptymessage) returns (GetlientSCountsResponse) {}

  // admin

  rpc AdminRegister(AdminRegisterRequest) returns (RegisterResponse) {}
  rpc AdminUpdateProfile(UpdateProfileRequest) returns (RegisterResponse) {}
  rpc UpdateAdminpass(PassUserRequest) returns (RegisterResponse) {}
  rpc ResetAdminPass(ResetAdminPassRequest) returns (RegisterResponse) {}
  rpc AdminGetProfile(Emptymessage) returns (ADMINS) {}
  rpc GetAdminbyid(GetAdminRequest) returns (ADMINS) {}
  rpc GetAllAdmin(Emptymessage) returns (GetAllADMINSResponse) {}
  rpc DeleteAdmin(GetAdminRequest) returns (RegisterResponse) {}
  rpc AddTesterByAdmin(GetClientRequest) returns (RegisterResponse) {}

  // users management
  // PROFILES

  rpc EditProfile(AddProfilesRequest) returns (ProfileResponse) {}
  rpc GetAllProfiles(Emptymessage) returns (All_PROFILES) {}
  rpc GetProfile(ProfileId) returns (All_PROFILES) {}
  rpc DeleteProfile(ProfileId) returns (ProfileResponse) {}
  rpc DeleteLinkedProfile(DeleteProfileReq) returns (ProfileResponse) {}
  rpc UserToProfile(UserToProfileRq) returns (ProfileResponse) {}
  rpc GetUsersByProfile(ProfileId) returns (UserArry) {}
  rpc GetUsersProfiles(GetUserRequest) returns (All_PROFILES) {}

  // TAX CLIENT IDS
  rpc GetAllTaxClientIds(Emptymessage) returns (ALL_TAX_CLIENT_IDS) {}
  rpc EditTaxClientId(TAX_CLIENT_ID_REQ) returns (MessageResponse) {}
  rpc DeleteTaxClientId(CLIENT_ID_REQ) returns (MessageResponse) {}

  // USER DEPARTMENTS
  rpc GetAllDepartments(GETDEPARTMENTSFILTER) returns (AllDEPARTMENTS) {}
  rpc GetUserDepartments(GETUSERDEPARTMENTSREQ) returns (USERDEPARTMENTSRES) {}
  rpc EditUserDepartments(USERDEPARTMENTSMESG) returns (MessageResponse) {}
  rpc DeleteUserDepartments(DEPARTMENTIID) returns (MessageResponse) {}
}

// login service

message LoginRequest {
  required string Username = 1;
  required string Password = 2;
  optional string DEVICE_TOKEN = 3;
  optional bool ISPORTAL = 4 [ default = false ];
}

message LoginResponse {
  optional string Token = 1;
  optional bool Succssed = 2;
  optional bool Activated = 3;
  optional string Name = 4;
  optional string Second_Name = 5;
  optional string Third_Name = 6;
  optional bool WITH_CUSTKEY = 7;
  optional central.types.MasDateTime ExpiresAt = 8;
  optional bool IS_ADMIN = 9;
}

message SignInResponse {
  optional string Token = 1;
  optional bool Succssed = 2;
  optional string Name = 3;
  optional central.types.MasDateTime ExpiresAt = 4;
  optional USERS USER = 5;
  optional string SITE_NAME = 6;
  optional string STATION_NAME = 7;
}

message RegisterResponse {
  optional string Message = 1;
  optional int64 SaveId = 2;
  optional string Token = 3;
}

message SignInWithRequest {
  required Applications APPLICATION_TYPE = 1;
  required int64 APPLICATION_ID = 2;
  optional string USER_NAME = 4;
  optional string EMAIL = 5;
  optional string MOBILE_NO = 6;
}

message RegisterRequest {
  optional int32 SITE_CODE = 1;
  repeated RELATED_CUSTKEY RELATED_CUSTKEY = 2;
  optional string PASSWORD = 3;
  optional string EMAIL = 4;
  required string MOBILE_NO = 5;
  required string NAME = 6;
  required string DEVICE_TOKEN = 7;
  optional string SECOND_NAME = 8;
  optional string THIRD_NAME = 9;
  optional string NID = 10;
  optional string ADDRESS = 11;
}

message ForgetRequest {
  optional int32 SITE_CODE = 1;
  optional string EMAIL = 2;
  optional string MOBILE_NO = 3;
  optional string DEVICE_TOKEN = 4;
}

message ValRequest {
  required string ResetPassCode = 1;
  optional string MOBILE_NO = 2;
  required string NewPassword = 3;
  optional string EMAIL = 4;
}

message Emptymessage {
  optional string MODULE_ID = 1;
  optional string VERSION = 2;
  optional bool   IS_HAND_HELD = 3;
}

message AdminSignInRequest {
  optional string USER_NAME = 1;
  optional string PASSWORD = 2;
  optional string DEVICE_TOKEN = 3;
}

message GetAllSitesResponse { repeated SITES SITES = 1; }

message SITES {
  optional int32 CODE = 1;
  optional string DESCRIBE = 2;
  optional bool IS_ACTIVE = 3;
  optional int64 SEQ = 4;
  optional string BILLING_IP = 5;
  optional string BILLING_PASSWORD = 6;
  optional string BILLING_PORT_NO = 7;
  optional string BILLING_USERNAME = 8;
  optional string SITE_IMAGE = 10; // @gotags: gorm:"type:nvarchar(max)"
  optional bool HAS_MAS = 11;
}

message licenceResponse { optional string licence = 1; }

//-----------------------

message access_contraint_response { optional string AccessContraint = 1; }

message CashierRequest { required int64 CASHIER_ID = 1; }

message GetlientSCountsResponse {
  optional int64 total = 1;
  optional int64 total_Day = 2;
  optional int64 total_Week = 3;
  optional int64 total_MOUNTH = 4;
  optional int64 total_YEAR = 5;
}

message ProfileResponse {
  optional string Message = 1;
  optional bool Done = 2;
  optional int64 Profile_ID = 3;
}

message MessageResponse {
  optional string Message = 1;
  optional bool Done = 2;
  optional int64 ID = 3;
}

message CustRequest {
  required string CUSTKEY = 1;
  optional int32 SITE_CODE = 2;
}

message AddRelatedCustkeyRequest {
  required int64 CLIENT_ID = 1;
  required string CUSTKEY = 2;
  optional string CUSTNAME = 3;
  required int32 SITE_CODE = 4;
  optional string BILLGROUP = 5;
  optional string BOOK_NO = 6;
  required int64 STATION_NO = 7;
  optional string ADDRESS = 8;
}

message GetCountsRequest { required Counts_type type = 1; }

message GetCountsResponse {
  optional int64 total_users = 1;
  optional int64 total_clients = 2;
  optional int64 total_admins = 3;
}

message AdminRegisterRequest {
  optional int32 SITE_CODE = 1;
  optional string PASSWORD = 2;
  optional string EMAIL = 3;
  required string USER_NAME = 4;
  required string NAME = 5;
  optional string DEVICE_TOKEN = 6;
  optional string NID = 7;
  optional string ADDRESS = 8;
  optional string MOBILE_NO = 9;
  optional bool SYS_ADMIN = 10;
  optional bool READINGS = 11;
  optional bool NEWS = 12;
  optional bool SUPPORT = 13;
  optional bool USERS = 14;
  optional bool SERVESES = 15;
  optional bool CTG_SERVESS = 16;
  optional bool REPORTS = 17;
}

message GetAllADMINSResponse { repeated ADMINS ADMINS = 1; }

message UpdateProfileRequest {
  optional int32 SITE_CODE = 1;
  optional string EMAIL = 2;
  optional string MOBILE_NO = 3;
  required string USER_NAME = 4;
  optional string DEVICE_TOKEN = 5;
  optional string ADMIN_NAME = 6;
  optional string NID = 7;
  optional string ADDRESS = 8;
  optional bool SYS_ADMIN = 10;
  optional bool READINGS = 11;
  optional bool NEWS = 12;
  optional bool SUPPORT = 13;
  optional bool USERS = 14;
  optional bool SERVESES = 15;
  optional bool CTG_SERVESS = 16;
  optional bool REPORTS = 17;
}

message ResetAdminPassRequest { required int64 ADMIN_ID = 1; }

message ResetPassRequest {
  required string MOBILE_NO = 1;
  required string NewPassword = 2;
}

message GetAdminRequest { required int64 ID = 1; }

message GetAllUserResponse { repeated MUSERS users = 1; }

