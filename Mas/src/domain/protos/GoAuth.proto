  optional string MOBILE_NO = 8;
  optional bool SUPERUSER = 9;
  optional bool SYS_ADMIN = 10;
  optional bool IS_CASHIER = 11;
  repeated USER_STATIONS USER_STATIONS = 12;
  repeated ProfileId PROFILES_ID = 13;
  optional bool IsActive = 14;
  optional string USER_PROFILE_IMAGE = 15;
