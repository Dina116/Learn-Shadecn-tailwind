}

message MicroUpdateRequest {
  required int64 clientid = 1;
  repeated RELATED_CUSTKEY RELATED_CUSTKEY = 2;
}

message AllDataRequest {
  optional int32 SITE_CODE = 1;
  optional int64 STATION_NO = 2;
  optional string BILLGROUP = 3;
  optional string BOOK_NO = 4;
  required Dir Direction = 5;
}

message AllDataResponse {
  repeated CLIENTS CL = 1;
  repeated MUSERS US = 2;
}

message ActivationRequest {
  required string ActivationPassCode = 1;
