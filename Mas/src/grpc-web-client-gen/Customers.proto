message EditOrderSeqCustomersReq {
  repeated EditOrderSeqCustomersReqItem Items = 1;
}

message  GetBillGroupsStatusReq {
   required string CUSTKEY = 1;
}

message BillingGroupStatusResponse {
	optional bool Status = 1;
}

message SaveCustomer_OldKeyReq{
    optional  string CUSTKEY = 1; 
    optional  int32 STATION_NO = 2; 
    optional  string GROUP_ID = 3; 
    optional  string AREA_CODE = 4;    
    optional  string FILE_NUMBER = 5; 
    optional  string BUILDING_NUMBER = 6;   
} 

message SaveCustomer_OldKeyRes{
    optional  string BILLGROUP = 1;   
    optional  string SURNAME = 2;
    optional  int32  STATION_NO = 3; 
    optional  string BOOK_NO = 4;
    optional  string UA_ADDRESS = 5;
    optional  int32  NO_UNITS = 6;
    optional  string METER_CONDITION = 7;
    optional  string C_TYPE = 8;
    optional  string METER_TYPE = 9;
} 

message EditOrderSeqCustomersReqItem {
  required string CUSTKEY = 1;
  required int64 ORDER_SEQ = 2;
}
message CustomersByBillGroupBookWalkReq {
  required string BILLGROUP = 1;
  required string BOOK_NO = 2;
  required int32 WALK_NO = 3;
}
message CUSTOMERS_ARR {
  repeated CUSTOMER_RESPONSE CUSTOMERS = 1;
}
message CUSTOMER_RESPONSE {
  required string CUSTKEY = 1;
  optional string ADDRESS = 2;
  optional string FULL_NAME = 3;
  required int64 ORDER_SEQ = 4;
}
message ReportCustomersSitesResponse {
  map<int32,int64> Items = 1;
}
message STATIONS_NOS {
  repeated int32 Stations = 1;
}
message GetCountCustomerByStationNoResponse {
  optional int64 CustomersCount = 1;
}
message ImportAllDataFromBillingREQ {
  optional bool FROM_IMPORTER = 1;
  required int64 GENERATED_ID = 2;
  required int32 CITY_CODE = 3;
}
message MessageCustResp {
  required string Msg=1;
  repeated CST_CUSTOMERS CUSTOMERS = 2;
  optional bool WITH_CUSTOMER = 3;
}

message Exists {
  required bool Found =1;
}
message ServiceName {
  required string ServiceName=1;
}

message SurNameRq {
  required string SURNAME =1;
}
message MessageResp {
  required string Msg=1;
}
message Version {
  required string Version =1;
 } 
message Empty {
}

